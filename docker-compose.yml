services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cms
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: cms
    volumes:
      - cms_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms -d cms"]
      interval: 5s
      timeout: 5s
      retries: 15
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - cms_redis:/data
  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - cms_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
  worker:
    build: .
    command: celery -A worker.celery_app worker --loglevel=INFO
    env_file: .env
    volumes:
      - cms_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
  beat:
    build: .
    command: celery -A worker.celery_app beat --loglevel=INFO
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
volumes:
  cms_postgres:
  cms_redis:
  cms_uploads:
